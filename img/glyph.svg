<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="g-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bb9af7"/>
      <stop offset="100%" style="stop-color:#7aa2f7"/>
    </linearGradient>
    <linearGradient id="bezier-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7aa2f7;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#bb9af7;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes pulse { 0%,100% { opacity: 0.20; } 50% { opacity: 0.45; } }
    .ctrlpt { animation: pulse 3s ease-in-out infinite; }
  </style>
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="url(#g-grad)" stroke-width="3"/>
  <!-- Faint grid (the supersample buffer hint) -->
  <g stroke="#7aa2f7" stroke-width="0.5" opacity="0.10">
    <line x1="60"  y1="60" x2="60"  y2="195"/>
    <line x1="80"  y1="60" x2="80"  y2="195"/>
    <line x1="100" y1="60" x2="100" y2="195"/>
    <line x1="120" y1="60" x2="120" y2="195"/>
    <line x1="140" y1="60" x2="140" y2="195"/>
    <line x1="160" y1="60" x2="160" y2="195"/>
    <line x1="180" y1="60" x2="180" y2="195"/>
    <line x1="200" y1="60" x2="200" y2="195"/>
    <line x1="60"  y1="60"  x2="200" y2="60"/>
    <line x1="60"  y1="80"  x2="200" y2="80"/>
    <line x1="60"  y1="100" x2="200" y2="100"/>
    <line x1="60"  y1="120" x2="200" y2="120"/>
    <line x1="60"  y1="140" x2="200" y2="140"/>
    <line x1="60"  y1="160" x2="200" y2="160"/>
    <line x1="60"  y1="180" x2="200" y2="180"/>
  </g>
  <!-- The 'g' glyph outline as a Bezier path with visible control points -->
  <!-- Bowl + descender, drawn as quadratic curves -->
  <path d="M 165 95
           Q 165 75 145 70
           Q 125 65 110 75
           Q 90  90 90 115
           Q 90  140 110 150
           Q 130 160 150 150
           Q 160 145 165 135
           L 165 165
           Q 165 185 145 190
           Q 125 195 105 188"
        fill="none" stroke="url(#bezier-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inner counter -->
  <ellipse cx="127" cy="115" rx="20" ry="20" fill="none" stroke="url(#bezier-grad)" stroke-width="2.5" opacity="0.7"/>
  <!-- Control-point dots (TTF off-curve points) -->
  <g fill="#f7768e" class="ctrlpt">
    <circle cx="165" cy="75"  r="2.2"/>
    <circle cx="125" cy="65"  r="2.2"/>
    <circle cx="90"  cy="90"  r="2.2"/>
    <circle cx="90"  cy="140" r="2.2"/>
    <circle cx="130" cy="160" r="2.2"/>
    <circle cx="165" cy="185" r="2.2"/>
    <circle cx="125" cy="195" r="2.2"/>
  </g>
  <!-- On-curve points (anchors) -->
  <g fill="#9ece6a">
    <circle cx="165" cy="95"  r="2.6"/>
    <circle cx="145" cy="70"  r="2.6"/>
    <circle cx="110" cy="75"  r="2.6"/>
    <circle cx="90"  cy="115" r="2.6"/>
    <circle cx="110" cy="150" r="2.6"/>
    <circle cx="150" cy="150" r="2.6"/>
    <circle cx="165" cy="135" r="2.6"/>
    <circle cx="165" cy="165" r="2.6"/>
    <circle cx="145" cy="190" r="2.6"/>
    <circle cx="105" cy="188" r="2.6"/>
  </g>
  <!-- Glass shine -->
  <circle cx="128" cy="128" r="118" fill="url(#shine)"/>
  <!-- Label -->
  <text x="128" y="226" font-family="monospace" font-size="22" font-weight="bold" fill="url(#g-grad)" text-anchor="middle" letter-spacing="3">glyph</text>
  <text x="128" y="240" font-family="monospace" font-size="6.5" fill="#565f89" text-anchor="middle">pure-asm TTF rasterizer</text>
</svg>
